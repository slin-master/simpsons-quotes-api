services:
  app:
    image: ${IMAGE_NAME:-simpsons-quotes-api:latest}
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: ${DOCKER_BUILD_TARGET:-production}
    container_name: simpsons-quotes-app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    command:
      - sh
      - -lc
      - php artisan migrate --seed --force && php artisan serve --host=0.0.0.0 --port=8080
    network_mode: bridge
    ports:
      - "8087:8080"
    restart: unless-stopped
    volumes:
      - ./data/storage/database:/var/www/html/storage/database
      - ./data/storage/logs:/var/www/html/storage/logs
